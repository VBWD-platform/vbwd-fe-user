name: Plugin Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests — ${{ matrix.plugin }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - booking
          - chat
          - checkout
          - cms
          - ghrm
          - landing1
          - paypal-payment
          - stripe-payment
          - taro
          - theme-switcher
          - yookassa-payment

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build vbwd-fe-core submodule
        run: cd vbwd-fe-core && npm install && npm run build

      - run: npm install

      - name: Install plugin
        run: git clone --depth=1 https://github.com/VBWD-platform/vbwd-fe-user-plugin-${{ matrix.plugin }}.git plugins/${{ matrix.plugin }}

      - name: Run pre-commit (style + unit)
        run: ./bin/pre-commit-check.sh --plugin ${{ matrix.plugin }} --unit
